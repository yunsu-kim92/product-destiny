<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다 | K-Destiny</title>
    <meta
      name="description"
      content="요청하신 페이지를 찾을 수 없습니다. K-Destiny 홈, 소개, 문의 페이지로 이동해 필요한 정보를 확인해보세요."
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #f8f5ff;
        font-family: Pretendard, "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at 0% 0%, rgba(143, 103, 255, 0.24), transparent 28%),
          radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.2), transparent 26%),
          linear-gradient(180deg, #070b16 0%, #0b1020 46%, #090e1b 100%);
      }
      main {
        width: min(760px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: rgba(17, 24, 49, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1.02;
      }
      p {
        margin: 0 0 18px;
        color: #b7bfdc;
        line-height: 1.8;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 18px;
        border-radius: 14px;
        color: #fff;
        text-decoration: none;
        background: linear-gradient(135deg, #8f67ff, #ec4899);
      }
      a.secondary {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>주소가 변경되었거나 잘못 입력되었을 수 있습니다. 아래 링크에서 홈, 소개, 문의 페이지로 이동할 수 있습니다.</p>
      <div class="links">
        <a href="/">홈으로 이동</a>
        <a class="secondary" href="/about">서비스 소개</a>
        <a class="secondary" href="/contact">문의 안내</a>
      </div>
    </main>
  </body>
  </html>
